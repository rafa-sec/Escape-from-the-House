<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="start">
    <div>
    <h1>Escape from the house</h1>
    <button onclick="start()">Start</button>
    </div>
</section>

<section class="rooms">
    <div id="bedroom" style="display: none;">
        <h2>Bedroom</h2>
        <img src="./cenarios/Bedroom.png" alt="">
    </div>

    <div id="livingroom" style="display: none;">
        <h2>Livingroom</h2>
        <img width="1240px" src="./cenarios/Livingroom.png" alt="">
    </div>

    <div id="kitchen" style="display: none;">
        <h2>Kitchen</h2>
        <img width="1240px" src="./cenarios/Kitchen.png" alt="">
    </div>

    <div id="garage" style="display: none;">
        <h2>Garage</h2>
        <img width="1240px" src="./cenarios/Garage.png" alt="">
    </div>

    <div id="backyard" style="display: none;">
        <h2>Backyard</h2>
        <img width="1240px" src="./cenarios/Backyard.png" alt="">
    </div>
</section>


<section id="menu" style="display: none;">

<div>
    <button>See inventory</button>
    <button>Look for something in the room</button>
    <button onclick="showWalkMenu()">Walk</button>
    <button style="display: none;">Shoot</button>
</div>

<div style="display: none;" id="walkMenu">
    <button id="bedroomButton" onclick="goToBedroom()">Bedroom</button>
    <button id="livingroomButton" onclick="goToLivingroom()">Livingroom</button>
    <button id="kitchenButton"  onclick="goToKitchen()">Kitchen</button>
    <button id="garageButton" onclick="goToGarage()">Garage</button>
    <button id="backyardButton" onclick="goToBackyard()">Backyard</button>
</div>

</section>



</body>


<script>
//Action count per round
actions = 1
function makeAction() {
    actions -= 1
}



    
//Menus
menu = document.getElementById("menu")
startMenu = document.getElementById("start")
walkMenu = document.getElementById("walkMenu")


//Rooms
const rooms = [
    { id: "bedroom", connections: ["livingroom"] },
    { id: "livingroom", connections: ["bedroom", "kitchen"] },
    { id: "kitchen", connections: ["livingroom", "garage"] },
    { id: "garage", connections: ["kitchen", "backyard"] },
    { id: "backyard", connections: ["garage"] }
];


//Set rooms' elements (image, button)
const roomElements = {};
rooms.forEach(room => {
    roomElements[room.id] = document.getElementById(room.id);
});


//Set current room
let currentRoom = "bedroom";

//Show room and its properties
function showRoom() {

    //Hide all rooms
    rooms.forEach(room => {
        roomElements[room.id].style.display = "none";
    });

    //Show current room
    roomElements[currentRoom].style.display = "block";

    updateWalkMenu();
}



function updateWalkMenu() {

    walkMenu.innerHTML = ""; // Clean old buttons

    const room = rooms.find(r => r.id === currentRoom);

    room.connections.forEach(conn => {

        const btn = document.createElement("button");
        btn.textContent = conn;

        btn.onclick = () => {
            currentRoom = conn;
            showRoom();
        };

    walkMenu.appendChild(btn);
});
}




//Start

function start(){
    startMenu.style.display = "none"
    menu.style.display = "block"

    currentRoom = "bedroom";
    showRoom();
}



//Menu

function showWalkMenu(){
    walkMenu.style.display = "block"
}
</script>











</html>
